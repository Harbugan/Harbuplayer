<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HarbuPlayer">
<meta name="description" content="Din personlige musikafspiller">
<link rel="manifest" id="pwa-manifest">
<title>HarbuPlayer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  /* Orange (default) — light */
  --o:#F97316;--od:#C2410C;--ol:#FED7AA;
  --bg:#FFF7ED;--surf:#FFFFFF;--bd:rgba(249,115,22,.16);
  --tx:#1C1917;--mu:#78716C;--trk:#FDBA74;
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme]),:root[data-theme="orange"]{
    --bg:#180800;--surf:#271000;--bd:rgba(249,115,22,.22);
    --tx:#FFF7ED;--mu:#A8A29E;--trk:#7C2D12;--ol:#3D1600
  }
}
/* ===== MAGENTA SKIN ===== */
:root[data-theme="magenta"]{
  --o:#D946EF;--od:#A21CAF;--ol:#F5D0FE;
  --bg:#FDF4FF;--surf:#FFFFFF;--bd:rgba(217,70,239,.16);
  --tx:#1C1917;--mu:#78716C;--trk:#F0ABFC;
}
@media(prefers-color-scheme:dark){
  :root[data-theme="magenta"]{
    --bg:#190520;--surf:#2A0A35;--bd:rgba(217,70,239,.22);
    --tx:#FDF4FF;--mu:#A8A29E;--trk:#701A75;--ol:#3F0F4A
  }
}
/* ===== TEAL SKIN ===== */
:root[data-theme="teal"]{
  --o:#14B8A6;--od:#0F766E;--ol:#99F6E4;
  --bg:#F0FDFA;--surf:#FFFFFF;--bd:rgba(20,184,166,.16);
  --tx:#0F172A;--mu:#64748B;--trk:#5EEAD4;
}
@media(prefers-color-scheme:dark){
  :root[data-theme="teal"]{
    --bg:#04201D;--surf:#0A2E2A;--bd:rgba(20,184,166,.22);
    --tx:#F0FDFA;--mu:#94A3B8;--trk:#134E4A;--ol:#0A332E
  }
}
/* ===== GREY SKIN ===== */
:root[data-theme="grey"]{
  --o:#6B7280;--od:#374151;--ol:#E5E7EB;
  --bg:#F9FAFB;--surf:#FFFFFF;--bd:rgba(107,114,128,.18);
  --tx:#111827;--mu:#6B7280;--trk:#D1D5DB;
}
@media(prefers-color-scheme:dark){
  :root[data-theme="grey"]{
    --bg:#0A0A0A;--surf:#1A1A1A;--bd:rgba(255,255,255,.12);
    --tx:#F5F5F5;--mu:#A3A3A3;--trk:#404040;--ol:#262626
  }
}
/* ===== SKELETON SKIN ===== */
:root[data-theme="skeleton"]{
  --o:#A8A29E;--od:#78716C;--ol:#F5F5F4;
  --bg:#FAFAF9;--surf:#FFFFFF;--bd:rgba(168,162,158,.20);
  --tx:#1C1917;--mu:#A8A29E;--trk:#E7E5E4;
}
@media(prefers-color-scheme:dark){
  :root[data-theme="skeleton"]{
    --bg:#0C0A09;--surf:#1C1917;--bd:rgba(168,162,158,.15);
    --tx:#FAFAF9;--mu:#A8A29E;--trk:#44403C;--ol:#292524
  }
}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}
#app{position:relative;flex:1;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;
  background:var(--bg);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.screen.off{transform:translateX(100%)}
/* Player specifically pops up from the bottom */
#player{transform:translateY(0)}
#player.off{transform:translateY(100%)}
#top-row{display:flex;align-items:center;gap:8px;
  padding:calc(10px + var(--safe-top)) 14px 10px;
  background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0}
#search-wrap{position:relative;display:flex;align-items:center;flex:1;min-width:0}
#menu-btn{background:var(--bg);border:1px solid var(--bd);color:var(--tx);
  border-radius:10px;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;-webkit-appearance:none;appearance:none}
#menu-btn:active{background:var(--ol)}
.si{position:absolute;left:11px;color:var(--mu);pointer-events:none;display:flex}
#search{width:100%;height:40px;border:.5px solid var(--bd);border-radius:10px;
  background:var(--bg);color:var(--tx);padding:0 36px 0 36px;font-size:15px;
  outline:none;-webkit-appearance:none;appearance:none}
#search:focus{border-color:var(--o);box-shadow:0 0 0 3px color-mix(in srgb, var(--o) 15%, transparent)}
#search-clear{position:absolute;right:8px;background:none;border:none;
  color:var(--mu);cursor:pointer;padding:4px;display:none;
  width:30px;height:30px;align-items:center;justify-content:center}
#search-clear.vis{display:flex}
#chips{display:flex;gap:6px;padding:10px 14px;flex-shrink:0}
.chip{background:var(--surf);border:1.5px solid var(--bd);color:var(--mu);
  border-radius:20px;padding:6px 8px;font-size:13px;font-weight:500;
  cursor:pointer;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:4px;
  flex:1;-webkit-appearance:none;appearance:none}
.chip.on{background:var(--o);border-color:var(--o);color:#fff}
#list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:60px 24px;text-align:center;color:var(--mu);font-size:14px;line-height:1.55}
.state .big{font-size:52px;opacity:.35}
/* ---- collapsible group headers ---- */
.grp-hdr{display:flex;align-items:center;gap:12px;padding:11px 14px;
  cursor:pointer;-webkit-user-select:none;user-select:none;
  background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0}
.grp-hdr:active{background:var(--ol)}
.grp-art{width:46px;height:46px;border-radius:10px;background:var(--ol);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  overflow:hidden;color:var(--o);background-size:cover;background-position:center}
.grp-meta{flex:1;min-width:0}
.grp-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.grp-artist{font-size:12px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-bottom:1px}
.grp-hdr.active .grp-name{color:var(--o)}
.grp-cnt{font-size:12px;color:var(--mu);margin-top:2px;display:block}
.grp-chev{color:var(--mu);flex-shrink:0;transition:transform .22s cubic-bezier(.4,0,.2,1)}
.grp-hdr.open .grp-chev{transform:rotate(90deg)}
/* indented rows inside an open group */
.grp-rows .row{padding-left:26px;border-left:3px solid var(--bd)}
.grp-rows .row:last-child{border-bottom:1px solid var(--bd)}
.row{display:flex;align-items:center;gap:12px;padding:10px 14px;
  cursor:pointer;transition:background .12s;-webkit-user-select:none;user-select:none}
.row:active{background:var(--ol)}
.row.play .t{color:var(--o);font-weight:600}
.ico{width:46px;height:46px;border-radius:10px;background:var(--ol);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  overflow:hidden;color:var(--o);background-size:cover;background-position:center}
.meta{flex:1;min-width:0}
.t{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s{font-size:12px;color:var(--mu);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav{background:none;border:none;color:var(--mu);cursor:pointer;
  padding:10px 6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fav.on{color:var(--o)}
#mini{position:absolute;bottom:0;left:0;right:0;
  background:var(--surf);border-top:1px solid var(--bd);
  padding-bottom:var(--safe-bot);
  transform:translateY(100%);transition:transform .3s;z-index:10;cursor:pointer}
#mini.vis{transform:translateY(0)}
#mini-prog{height:2px;background:var(--o);width:0;transition:width .5s linear}
#mini-row{display:flex;align-items:center;gap:10px;padding:10px 14px}
#mini-art{width:44px;height:44px;border-radius:8px;background:var(--ol);
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background-size:cover;background-position:center;color:var(--o)}
#mini-meta{flex:1;min-width:0}
#mini-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mini-artist{font-size:12px;color:var(--mu);margin-top:1px}
#mini-pp{background:none;border:none;cursor:pointer;color:var(--tx);
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#player{z-index:20}
#pl-drag-handle{
  padding-top:calc(10px + var(--safe-top));
  padding-bottom:6px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0}
#pl-drag-pill{
  width:36px;height:4px;border-radius:2px;
  background:var(--bd)}
#pl-body{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:14px 16px;gap:12px;overflow:hidden}
#pl-art{width:min(320px,85vw,38vh);aspect-ratio:1;border-radius:18px;
  background:var(--ol);display:flex;align-items:center;justify-content:center;
  overflow:hidden;color:var(--o);will-change:transform;
  box-shadow:0 8px 40px rgba(0,0,0,.18);transition:transform .2s,box-shadow .3s}
/* Compositor-only pulse: transform (no per-frame paint), plus a static
   accent glow while playing. Animating box-shadow blur was repainting a
   large blurred area every frame — heavy on the Adreno 540 / Snapdragon 835. */
#pl-art.playing{
  box-shadow:0 8px 40px rgba(0,0,0,.18), 0 0 30px 2px color-mix(in srgb, var(--o) 26%, transparent);
  animation:artPulse 3s ease-in-out infinite}
#pl-art img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;pointer-events:none}
@keyframes artPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
@media(prefers-reduced-motion:reduce){
  #pl-art.playing{animation:none}
}
#pl-info{text-align:center;width:100%}
#pl-title{font-size:18px;font-weight:700;line-height:1.2}
#pl-artist{font-size:14px;color:var(--mu);margin-top:4px}
#pl-prog{width:100%;cursor:pointer;user-select:none;-webkit-user-select:none}
#pl-bar{height:4px;background:var(--trk);border-radius:2px;position:relative;margin-bottom:6px}
#pl-fill{height:100%;background:var(--o);border-radius:2px;width:0}
#pl-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:16px;height:16px;border-radius:50%;background:var(--o);left:0}
#pl-times{display:flex;justify-content:space-between;font-size:11px;color:var(--mu)}
#pl-btns{display:flex;align-items:center;justify-content:center;gap:0;width:100%}
.pb{background:none;border:none;cursor:pointer;color:var(--tx);
  display:flex;align-items:center;justify-content:center;
  width:56px;height:56px;border-radius:50%;-webkit-appearance:none;appearance:none}
.pb:active{background:color-mix(in srgb, var(--o) 12%, transparent)}
.pb.lg{width:64px;height:64px;background:var(--o);color:#fff;box-shadow:0 4px 16px color-mix(in srgb, var(--o) 40%, transparent)}
.pb.lg:active{background:var(--od)}
.pb.dim{color:var(--mu)}
.pb.on{color:var(--o)}
#pl-vol{display:flex;align-items:center;gap:10px;width:100%}
#pl-vol .pb{width:36px;height:36px;color:var(--mu)}
#pl-vol input{flex:1;height:4px;-webkit-appearance:none;appearance:none;
  background:var(--trk);border-radius:2px;outline:none;cursor:pointer}
#pl-vol input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--o);cursor:pointer}
#pl-upnext{font-size:12px;color:var(--mu);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;padding:0 8px;min-height:16px}
#scan-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:100;align-items:center;justify-content:center}
#scan-overlay.vis{display:flex}
#scan-box{background:var(--surf);border-radius:16px;padding:28px 24px;
  text-align:center;width:min(320px,90vw);display:flex;flex-direction:column;
  align-items:center;gap:14px}
.sb-icon{font-size:44px;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sb-title{font-size:16px;font-weight:700}
.sb-sub{font-size:13px;color:var(--mu);line-height:1.5}
.sb-prog{width:100%;height:4px;background:var(--trk);border-radius:2px;overflow:hidden}
.sb-fill{height:100%;background:var(--o);border-radius:2px;width:0;transition:width .3s}
#toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1C1917;color:#fff;border-radius:10px;padding:10px 18px;
  font-size:14px;white-space:nowrap;opacity:0;
  transition:opacity .2s,transform .2s;z-index:200;pointer-events:none}
#toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== BOTTOM SHEET MENU ===== */
#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;
  opacity:0;pointer-events:none;transition:opacity .25s}
#menu-overlay.vis{opacity:1;pointer-events:all}
#menu-sheet{position:fixed;bottom:0;left:0;right:0;z-index:51;
  background:var(--surf);border-radius:20px 20px 0 0;
  padding-bottom:calc(10px + var(--safe-bot));
  transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
#menu-sheet.vis{transform:translateY(0)}
#menu-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;
  margin:12px auto 6px;flex-shrink:0}
.mnu-sec{font-size:11px;font-weight:700;color:var(--mu);
  letter-spacing:.08em;text-transform:uppercase;padding:10px 20px 4px}
/* Collapsible section header */
.mnu-sec-toggle{display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;padding-right:16px;-webkit-user-select:none;user-select:none}
.mnu-sec-toggle:active{opacity:.7}
.mnu-sec-chev{color:var(--mu);transition:transform .22s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.mnu-sec-chev.open{transform:rotate(90deg)}
/* Collapsible body */
.mnu-collapse{overflow:hidden;
  transition:max-height .28s cubic-bezier(.4,0,.2,1), opacity .2s;
  max-height:0;opacity:0}
.mnu-collapse.open{max-height:400px;opacity:1}
/* Add music row */
.mnu-add-row{display:flex;align-items:center;gap:14px;padding:10px 20px}
.mnu-add-pills{display:flex;gap:8px;flex-shrink:0}
.mnu-pill{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;
  border:1.5px solid var(--bd);background:var(--bg);color:var(--tx);
  cursor:pointer;display:flex;align-items:center;gap:5px;
  -webkit-appearance:none;appearance:none;white-space:nowrap}
.mnu-pill:active{background:var(--ol);border-color:var(--o);color:var(--o)}
/* Skin swatches */
.skin-row{display:flex;gap:14px;padding:10px 20px 14px;justify-content:center;flex-wrap:wrap}
.skin-swatch{width:46px;height:46px;border-radius:50%;
  border:3px solid var(--bd);background:var(--sw,#000);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#fff;flex-shrink:0;-webkit-appearance:none;appearance:none;
  transition:transform .15s, border-color .15s;position:relative}
.skin-swatch:active{transform:scale(.92)}
.skin-swatch.on{border-color:var(--tx)}
.skin-swatch .chk{opacity:0;transition:opacity .15s}
.skin-swatch.on .chk{opacity:1}
.mnu-item{display:flex;align-items:center;gap:14px;width:100%;
  padding:11px 20px;background:none;border:none;color:var(--tx);
  cursor:pointer;text-align:left;-webkit-appearance:none;appearance:none;
  -webkit-user-select:none;user-select:none}
.mnu-item:not([disabled]):active{background:var(--ol)}
.mnu-item[disabled]{opacity:.42;cursor:default}
.mnu-item.danger .mnu-ico{background:#FEF2F2;color:#EF4444}
.mnu-item.danger .mnu-lbl{color:#EF4444}
.mnu-ico{width:40px;height:40px;border-radius:11px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  color:var(--o);flex-shrink:0}
.mnu-txt{flex:1;min-width:0}
.mnu-lbl{font-size:15px;font-weight:500;line-height:1.2}
.mnu-sub{font-size:12px;color:var(--mu);margin-top:2px}
.mnu-badge{background:var(--bd);color:var(--mu);border-radius:6px;
  padding:2px 8px;font-size:11px;font-weight:600;flex-shrink:0;white-space:nowrap}
.mnu-div{height:1px;background:var(--bd);margin:6px 20px}
#mnu-cancel{width:calc(100% - 28px);margin:10px 14px 0;height:48px;
  border:1.5px solid var(--bd);border-radius:12px;background:none;
  color:var(--tx);font-size:15px;font-weight:600;cursor:pointer;
  display:block;-webkit-appearance:none;appearance:none}
#mnu-cancel:active{background:var(--ol)}
.h-inp{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.scroll-anchor{height:calc(72px + var(--safe-bot));flex-shrink:0}
/* ---- sort row (collapsible) ---- */
#sort-row{display:flex;align-items:center;gap:6px;padding:0 14px;
  background:var(--surf);flex-shrink:0;
  max-height:0;overflow:hidden;
  border-bottom:1px solid transparent;
  transition:max-height .25s cubic-bezier(.4,0,.2,1),
             padding .25s cubic-bezier(.4,0,.2,1),
             border-bottom-color .25s}
#sort-row.open{max-height:50px;padding:6px 14px 8px;border-bottom-color:var(--bd)}
#sort-lbl{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.06em;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;margin-right:2px}
.sort-pill{background:var(--bg);border:1.5px solid var(--bd);color:var(--mu);
  border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  -webkit-appearance:none;appearance:none;line-height:1.4}
.sort-pill.on{background:var(--o);border-color:var(--o);color:#fff;font-weight:600}
/* ---- version row ---- */
.mnu-item.mnu-static{cursor:default}
.mnu-item.mnu-static:active{background:none}
.mnu-update-btn{
  background:var(--o);border:none;color:#fff;
  border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;
  cursor:pointer;display:none;align-items:center;gap:5px;
  -webkit-appearance:none;appearance:none;white-space:nowrap;flex-shrink:0
}
.mnu-update-btn.vis{display:flex}
.mnu-update-btn:active{background:var(--od)}
.mnu-update-btn[disabled]{opacity:.65;cursor:default}
.mnu-update-btn svg{flex-shrink:0}
.mnu-update-btn.spin svg{animation:spin .9s linear infinite}
</style>
</head>
<body>
<input id="dir-input" class="h-inp" type="file" accept="audio/*" webkitdirectory directory multiple>
<input id="file-input" class="h-inp" type="file" accept="audio/*" multiple>

<div id="app">
  <div class="screen" id="library">
    <div id="top-row">
      <div id="search-wrap">
        <span class="si"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input id="search" type="search" placeholder="Search title, artist, album..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <button id="search-clear">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <button id="menu-btn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      </button>
    </div>

<script>
(function(){
'use strict';

// ================================================================
// APP CONFIG — bump APP_VERSION on every GitHub release.
// GITHUB_REPO must match the path on github.com (e.g. "octocat/hello-world").
// ================================================================
var APP_VERSION = 'v0.0.5';
var GITHUB_REPO = 'Harbugan/Harbuplayer';   // <-- EDIT THIS

// ================================================================
// STATE
// ================================================================
var lib = [];
var curId = null;
var queue = [];
var qpos = -1;
var view = 'all';
var sort = 'recent';   // 'recent' | 'title' | 'artist' | 'album'
var sortOpen = false;  // sort row collapsed by default; toggled by clicking the active chip
var searchQ = '';
var shuffle = false;
var repeat = false;
var openGroups = {};   // key: groupName → true when expanded
var theme = 'orange';
var THEMES = ['orange','magenta','teal','grey','skeleton'];
var _artSwiping = false; // true while a swipe-triggered art animation is in flight
  var _nextShufflePos = -1; // pre-picked queue position for shuffle mode
  
// ================================================================
// UTILS
// ================================================================
function $(id){ return document.getElementById(id); }
function esc(s){
  return (s||'').replace(/[&<>"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
  });
}
function fmt(s){
  if(!s||isNaN(s)) return '0:00';
  var m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}
function toast(msg, dur){
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('vis');
  clearTimeout(t._h);
  t._h=setTimeout(function(){ t.classList.remove('vis'); }, dur||2400);
}
function trackById(id){
  for(var i=0;i<lib.length;i++) if(lib[i].id===id) return lib[i];
  return null;
}

// ================================================================
// THEME / SKIN
// ================================================================
function applyTheme(name){
  if(THEMES.indexOf(name)===-1) name='orange';
  theme=name;
  if(name==='orange') document.documentElement.removeAttribute('data-theme');
  else                document.documentElement.setAttribute('data-theme', name);
  // Sync mobile status-bar color with the active accent
  var meta=document.querySelector('meta[name="theme-color"]');
  if(meta){
    var accent=getComputedStyle(document.documentElement).getPropertyValue('--o').trim();
    if(accent) meta.setAttribute('content', accent);
  }
  // Mark the active swatch
  document.querySelectorAll('.skin-swatch').forEach(function(s){
    s.classList.toggle('on', s.dataset.theme===name);
  });
}

// ================================================================
// INDEXEDDB
// ================================================================
var DB_NAME = 'harbu_v3';
var db;

function openDB(){
  return new Promise(function(res,rej){
    var r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = function(e){
      var d = e.target.result;
      if(!d.objectStoreNames.contains('tracks'))
        d.createObjectStore('tracks',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('meta'))
        d.createObjectStore('meta');
    };
    r.onsuccess = function(e){ db=e.target.result; res(db); };
    r.onerror   = function(){ rej(r.error); };
  });
}
function dbTx(store,mode){ return db.transaction(store,mode).objectStore(store); }
function dbAdd(rec){
  return new Promise(function(res,rej){
    var r=dbTx('tracks','readwrite').add(rec);
    r.onsuccess=function(){ res(r.result); };
    r.onerror=function(){ rej(r.error); };
  });
}
function dbPut(rec){
  return new Promise(function(res,rej){
    var r=dbTx('tracks','readwrite').put(rec);
    r.onsuccess=function(){ res(); };
    r.onerror=function(){ rej(r.error); };
  });
}
function dbDel(id){
  return new Promise(function(res,rej){
    var r=dbTx('tracks','readwrite').delete(id);
    r.onsuccess=function(){ res(); };
    r.onerror=function(){ rej(r.error); };
  });
}
function dbAll(){
  return new Promise(function(res,rej){
    var r=dbTx('tracks','readonly').getAll();
    r.onsuccess=function(){ res(r.result||[]); };
    r.onerror=function(){ rej(r.error); };
  });
}
function dbMeta(key,val){
  var s=dbTx('meta','readwrite');
  if(val===undefined){
    return new Promise(function(res,rej){
      var r=s.get(key);r.onsuccess=function(){res(r.result);};r.onerror=function(){rej(r.error);};
    });
  }
  return new Promise(function(res,rej){
    var r=s.put(val,key);r.onsuccess=function(){res();};r.onerror=function(){rej(r.error);};
  });
}

// ================================================================
// FILE SYSTEM ACCESS API — showDirectoryPicker
// ================================================================
function isAudio(name){
  return /\.(mp3|m4a|aac|ogg|oga|wav|flac|opus|wma)$/i.test(name);
}

async function gatherFilesFromDir(dirHandle, acc){
  for await(var entry of dirHandle.values()){
    if(entry.kind === 'file'){
      var f = await entry.getFile();
      if(isAudio(f.name)) acc.push(f);
    } else if(entry.kind === 'directory'){
      try { await gatherFilesFromDir(entry, acc); } catch(e){}
    }
  }
  return acc;
}

async function scanWithPicker(){
  try {
    var handle = await window.showDirectoryPicker({ mode:'read', startIn:'music' });
    showScanUI(0, 0, 'Finding audio files...');
    var files = await gatherFilesFromDir(handle, []);
    if(!files.length){
      hideScanUI();
      toast('No audio files found in folder');
      return;
    }
    await processFiles(files);
  } catch(e){
    hideScanUI();
    if(e.name === 'AbortError') return;
    // API ikke tilgaengelig eller adgang naegtede — brug fallback
    $('dir-input').click();
  }
}

// ================================================================
// SCAN UI
// ================================================================
function showScanUI(done, total, msg){
  $('scan-overlay').classList.add('vis');
  $('scan-sub').textContent = msg;
  $('scan-fill').style.width = (total ? Math.round((done/total)*100) : 0)+'%';
}
function updateScanUI(done, total){
  $('scan-sub').textContent = 'Reading: '+done+' / '+total;
  $('scan-fill').style.width = (total ? Math.round((done/total)*100) : 0)+'%';
}
function hideScanUI(){
  $('scan-overlay').classList.remove('vis');
}

// ================================================================
// PROCESS FILES — additive, deduplication
// ================================================================
async function processFiles(files){
  var existing = {};
  lib.forEach(function(t){ existing[t.fname+'|'+t.fsize]=true; });
  var fresh = files.filter(function(f){ return !existing[f.name+'|'+f.size]; });

  if(!fresh.length){
    hideScanUI();
    toast('All files are already in the library');
    return;
  }

  var total = fresh.length;
  var done = 0;
  showScanUI(0, total, 'Reading: 0 / '+total);

  for(var i=0; i<fresh.length; i++){
    var f = fresh[i];
    try {
      var tags = await parseID3(f);
      var fb = parseFallback(f.name);

      var rec = {
        name:   (tags.title  || fb.title).trim()  || fb.title,
        artist: (tags.artist || fb.artist).trim() || fb.artist,
        album:  (tags.album  || 'Unknown album').trim(),
        fav: false, dur: null,
        fname: f.name, fsize: f.size,
        blob: f,
        pic: tags.pic || null
      };

      var id = await dbAdd(rec);
      rec.id = id;
      rec.url = URL.createObjectURL(f);
      rec.artUrl = rec.pic
        ? URL.createObjectURL(new Blob([rec.pic.data], {type: rec.pic.mime||'image/jpeg'}))
        : null;

      lib.push(rec);
      done++;
      updateScanUI(done, total);
      if(done % 8 === 0) render();

      // Queue background artwork fetch if no embedded cover was found
      if(!rec.artUrl) queueArtwork(rec);
    } catch(e){
      done++;
    }
  }

  hideScanUI();
  render();
  toast('Added '+done+(done===1?' track':' tracks'));
  saveMeta();
}

function getDuration(url){
  return new Promise(function(res,rej){
    var a = new Audio();
    a.preload='metadata';
    a.src=url;
    a.addEventListener('loadedmetadata',function(){ res(a.duration); a.src=''; },{once:true});
    a.addEventListener('error',function(){ rej(new Error('err')); },{once:true});
    setTimeout(function(){ rej(new Error('timeout')); }, 6000);
  });
}

function parseFallback(filename){
  var base = filename.replace(/\.[^/.]+$/,'');
  var m = base.split(' - ');
  if(m.length >= 2) return {artist:m[0].trim(), title:m.slice(1).join(' - ').trim()};
  return {artist:'Unknown artist', title:base};
}

// ================================================================
// ID3 PARSER
// ================================================================
function parseID3(file){
  return new Promise(function(res){
    var out = {title:'',artist:'',album:'',pic:null};
    var head = file.slice(0, Math.min(128*1024, file.size));
    var fr = new FileReader();
    fr.onload = function(e){
      try {
        var u8 = new Uint8Array(e.target.result);
        if(u8[0]===0x49&&u8[1]===0x44&&u8[2]===0x33){
          var ver=u8[3];
          var hdrSize=syncsafe(u8,6);
          var off=10, end=off+hdrSize;
          while(off<end-10){
            var fid=String.fromCharCode(u8[off],u8[off+1],u8[off+2],u8[off+3]);
            var sz=ver>=4?syncsafe(u8,off+4):(u8[off+4]<<24|u8[off+5]<<16|u8[off+6]<<8|u8[off+7]);
            if(sz<=0||sz>500000){off+=10;continue;}
            var data=u8.slice(off+10,off+10+sz);
            if(fid==='TIT2'||fid==='TPE1'||fid==='TALB'){
              var enc=data[0],str='';
              if(enc===0)           str=decLatin1(data.slice(1)); // ISO-8859-1 — covers Æ Ø Å
              else if(enc===3)      str=decUTF8(data.slice(1));   // UTF-8
              else if(enc===1||enc===2) str=decUTF16(data.slice(1)); // UTF-16
              if(fid==='TIT2')out.title=str.trim();
              else if(fid==='TPE1')out.artist=str.trim();
              else if(fid==='TALB')out.album=str.trim();
            } else if(fid==='APIC'){
              try{
                var i2=1;
                while(i2<data.length&&data[i2]!==0)i2++;
                i2+=2;
                while(i2<data.length&&data[i2]!==0)i2++;
                i2++;
                if(i2<data.length) out.pic={data:data.slice(i2),mime:'image/jpeg'};
              }catch(ex){}
            }
            off+=10+sz;
          }
        }
      } catch(ex){}
      res(out);
    };
    fr.onerror=function(){ res(out); };
    fr.readAsArrayBuffer(head);
  });
}
function syncsafe(u8,off){
  return((u8[off]&0x7f)<<21)|((u8[off+1]&0x7f)<<14)|((u8[off+2]&0x7f)<<7)|(u8[off+3]&0x7f);
}
// ISO-8859-1 / Latin-1 — enc byte 0 in ID3v2; covers Æ Ø Å and all Western European chars
function decLatin1(u8){
  try{return new TextDecoder('iso-8859-1').decode(u8).replace(/\0.*$/,'');}catch(e){return '';}
}
function decUTF8(u8){
  try{return new TextDecoder('utf-8').decode(u8).replace(/\0.*$/,'');}catch(e){return '';}
}
function decUTF16(u8){
  try{
    var bom=u8[0]===0xff&&u8[1]===0xfe?'utf-16le':'utf-16be';
    return new TextDecoder(bom).decode(u8.slice(2)).replace(/\0.*$/,'');
  }catch(e){return '';}
}

// ================================================================
// AUDIO ENGINE
// ================================================================
var audio = new Audio();
audio.preload = 'auto';

// play() — builds queue from current visible list (used in "Alle" view)
function play(id){
  var t=trackById(id); if(!t) return;
  var vis=getVisible();
  queue=vis.map(function(x){return x.id;});
  qpos=queue.indexOf(id);
  if(qpos===-1){ queue=lib.map(function(x){return x.id;}); qpos=queue.indexOf(id); }
  _startPlayback(id, t);
}
// Pre-pick the next shuffle position so "Up next" can show something accurate.
// Avoids repeating the current track unless the queue has only one entry.
function _pickNextShuffle(){
  if(!queue.length){ _nextShufflePos=-1; return; }
  if(queue.length===1){ _nextShufflePos=0; return; }
  var pick;
  do { pick=Math.floor(Math.random()*queue.length); } while(pick===qpos);
  _nextShufflePos=pick;
}
  
// playFromGroup() — builds queue from the specific album/artist group
function playFromGroup(id, groupTracks){
  var t=trackById(id); if(!t) return;
  queue=groupTracks.map(function(x){return x.id;});
  qpos=queue.indexOf(id);
  if(qpos===-1){ qpos=0; }
  // Open the group when you start playing from it (user-initiated, not on every render)
  var key=view==='albums'?'album':'artist';
  openGroups[t[key]]=true;
  curId=id;
  _startPlayback(id, t);
}

function _startPlayback(id, t){
  _transitioning = true;   // suppress the pause event fired by changing audio.src
  curId=id;
  // Update MediaSession BEFORE play() so Chrome knows the session is active
  setMediaSession(t);
  audio.src=t.url;
  audio.volume=$('vol-slider').value/100;
  var p=audio.play();
  if(p){
    p.catch(function(e){
      // NotAllowedError in background — retry once after a short delay
      if(e.name==='NotAllowedError'||e.name==='AbortError'){
        setTimeout(function(){ audio.play().catch(function(){}); }, 300);
      }
    });
  }
if(shuffle) _pickNextShuffle();
  updatePlayerUI(t);
  if(!setPlayingRow(id)) render();
  saveMeta();
}

function togglePlay(){
  if(audio.paused) audio.play().catch(function(){});
  else audio.pause();
}

function nextTrack(){
  if(!queue.length) return;
  if(shuffle) qpos=(_nextShufflePos>=0)?_nextShufflePos:Math.floor(Math.random()*queue.length);
  else qpos=(qpos+1)%queue.length;
  var id=queue[qpos];
  var t=trackById(id); if(!t) return;
  // Go directly to _startPlayback — do NOT call play() which would rebuild the queue
  curId=id;
  _startPlayback(id, t);
}

function prevTrack(){
  if(audio.currentTime>3){ audio.currentTime=0; return; }
  if(!queue.length) return;
  if(shuffle) qpos=Math.floor(Math.random()*queue.length);
  else qpos=(qpos-1+queue.length)%queue.length;
  var id=queue[qpos];
  var t=trackById(id); if(!t) return;
  curId=id;
  _startPlayback(id, t);
}

function updatePlayerUI(t){
  var hasArt = !!(t&&t.artUrl);
  $('pl-title').textContent   = t ? t.name   : 'No track selected';
  $('pl-artist').textContent  = t ? t.artist+(t.album&&t.album!=='Unknown album'?' \u00b7 '+t.album:'') : '';
var _ht=$('pl-hdr-title'), _hs=$('pl-hdr-sub');
  if(_ht) _ht.textContent = t ? t.name   : 'HarbuPlayer';
  if(_hs) _hs.textContent = t ? t.artist : '';
  var art=$('pl-art');
  // Reset stale swipe styles for non-swipe track changes (e.g. track ended naturally).
  // Skipped when _artSwiping is true — the swipe code takes ownership of the animation.
  if(!_artSwiping){
    art.style.transition=''; art.style.transform=''; art.style.opacity='';
  }
  if(hasArt){
    art.innerHTML='<img src="'+t.artUrl+'" alt="'+esc(t.album||'')+'" '
      +'style="width:100%;height:100%;object-fit:cover;object-position:center;display:block;">';
  } else {
    art.innerHTML=svgVinyl(200);
  }
  $('mini-title').textContent  = t ? t.name   : 'Nothing playing';
  $('mini-artist').textContent = t ? t.artist : '';
  var mart=$('mini-art');
  mart.style.backgroundImage = hasArt ? 'url('+t.artUrl+')' : '';
  mart.innerHTML = hasArt ? '' : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
  if(t) $('mini').classList.add('vis');
  updateUpNext();
}

// Returns the next track in the queue, or null when the result is unpredictable
// (shuffle) or redundant (repeat — same track plays again).
function getUpNextTrack(){
  if(!queue.length || qpos < 0 || repeat) return null;
  if(shuffle) return _nextShufflePos>=0 ? trackById(queue[_nextShufflePos]) : null;
  return trackById(queue[(qpos + 1) % queue.length]);
}

function updateUpNext(){
  var el = $('pl-upnext');
  if(!el) return;
  var next = getUpNextTrack();
  // Don't show "Up next: <current track>" when the queue wraps back to the start
  el.textContent = (next && next.id !== curId)
    ? 'Up next: ' + next.artist + ' \u2013 ' + next.name
    : '';
}

// ================================================================
// MEDIA SESSION
// ================================================================
function setMediaSession(t){
  if(!('mediaSession' in navigator)) return;
  var art=[];
  if(t.artUrl) art=[{src:t.artUrl,sizes:'512x512',type:'image/jpeg'}];
  navigator.mediaSession.metadata=new MediaMetadata({
    title:t.name, artist:t.artist, album:t.album, artwork:art
  });
  // Tell Android Chrome to keep the audio session alive in background
  navigator.mediaSession.playbackState='playing';
  navigator.mediaSession.setActionHandler('play',       function(){ audio.play(); });
  navigator.mediaSession.setActionHandler('pause',      function(){ audio.pause(); });
  navigator.mediaSession.setActionHandler('nexttrack',  nextTrack);
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('seekto', function(d){
    if(d.seekTime&&audio.duration) audio.currentTime=d.seekTime;
  });
}

// ================================================================
// RENDER
// ================================================================
// Strips a leading "The " from an album name for sort purposes only —
// the displayed name is unchanged. Applied wherever album names are compared.
function _stripThe(s){ return (s||'').replace(/^the\s+/i,''); }

function getVisible(){
  var q=searchQ.trim().toLowerCase();
  var arr=lib.slice();
  if(view==='fav') arr=arr.filter(function(t){return t.fav;});
  if(q) arr=arr.filter(function(t){
    return (t.name+' '+t.artist+' '+t.album).toLowerCase().indexOf(q)!==-1;
  });
  // Apply sort
  if(sort==='title'){
    arr.sort(function(a,b){return a.name.localeCompare(b.name,'da',{sensitivity:'base'});});
  } else if(sort==='artist'){
    arr.sort(function(a,b){
      var c=a.artist.localeCompare(b.artist,'da',{sensitivity:'base'});
      return c!==0?c:a.name.localeCompare(b.name,'da',{sensitivity:'base'});
    });
  } else if(sort==='album'){
    arr.sort(function(a,b){
      var c=_stripThe(a.album).localeCompare(_stripThe(b.album),'da',{sensitivity:'base'});
      return c!==0?c:a.name.localeCompare(b.name,'da',{sensitivity:'base'});
    });
  }
  // 'recent' keeps insertion order (lib is ordered by autoincrement id)
  return arr;
}

function svgHeart(on){

}

// Vinyl record SVG — used as default artwork when no cover is available.
// Disc is neutral black so it sits cleanly under any skin; label uses var(--o).
// Returns the artist label to show for a group of tracks (album view).
// Priority: TPE2 albumArtist → single artist → 2-3 artists listed → "Various Artists"
function getDisplayArtist(tracks){
  // Use albumArtist from the first track that has one
  for(var i=0;i<tracks.length;i++){
    if(tracks[i].albumArtist) return tracks[i].albumArtist;
  }
  // Collect unique track artists
  var seen = {}, unique = [];
  tracks.forEach(function(t){
    var a = t.artist || 'Unknown artist';
    if(!seen[a]){ seen[a]=true; unique.push(a); }
  });
  if(unique.length <= 3) return unique.join(', ');
  return 'Various Artists';
}

    +'<circle cx="50" cy="50" r="37" fill="#0a0a0a" stroke="rgba(255,255,255,.05)" stroke-width="1.2"/>'
    +'<circle cx="50" cy="50" r="31" fill="#050505" stroke="rgba(255,255,255,.07)" stroke-width="1.2"/>'
    +'<circle cx="50" cy="50" r="25" fill="#0a0a0a" stroke="rgba(255,255,255,.05)" stroke-width="1.2"/>'

// ================================================================
// ARTWORK FETCHING (iTunes Search API — free, no key, CORS OK)
//
// Optimised so each ALBUM hits the network at most once. A successful
// fetch is applied to every track in lib that shares the same
// artist|album key. Three session-scoped caches:
//   _albumArtPromises — dedupes concurrent fetches for the same album
//   _albumArtMisses   — remembers albums iTunes returned nothing for
//   (sibling-copy)    — before queuing, reuse pic data from any track
//                       in lib that already has it for this album
// ================================================================
var _artQueue       = [];
var _artFetching    = false;
var _albumArtPromises = {}; // key → Promise<{data,mime}|null>
var _albumArtMisses   = {}; // key → true

// Stable per-album key, or null if metadata is too weak to share artwork.
// Requires BOTH artist and album to be known — otherwise we don't risk
// putting one "Unknown album" cover on every other "Unknown album" track.
function _albumKey(rec){
  if(!rec) return null;
  if(!rec.album  || rec.album  === 'Unknown album')  return null;
  if(!rec.artist || rec.artist === 'Unknown artist') return null;
  return rec.artist.toLowerCase().trim() + '|' + rec.album.toLowerCase().trim();
}

// Scan lib for any sibling track that already has pic bytes for this album.
function _findSiblingWithArt(key, excludeId){
  if(!key) return null;
  for(var i=0;i<lib.length;i++){
    var t = lib[i];
    if(t.id === excludeId || !t.pic) continue;
    if(_albumKey(t) === key) return t;
  }
  return null;
}

// Apply a pic object to ONE track, persist, refresh affected UI.
async function _applyPicToTrack(rec, pic){
  if(!rec || !pic) return;
  rec.pic = pic;
  try {
    var blob = new Blob([pic.data], {type: pic.mime || 'image/jpeg'});
    rec.artUrl = URL.createObjectURL(blob);
  } catch(e){ rec.artUrl = null; }
  try { await dbPut(rec); } catch(e){}
  patchArtworkInDOM(rec);
  if(rec.id === curId) updatePlayerUI(rec);
}

// Apply a pic object to EVERY un-arted track in the album, one render at the end.
async function _applyPicToAlbum(key, pic){
  if(!key || !pic) return;
  var updates = [];
  for(var i=0;i<lib.length;i++){
    var t = lib[i];
    if(t.artUrl) continue;
    if(_albumKey(t) !== key) continue;
    t.pic = pic;
    try {
      var blob = new Blob([pic.data], {type: pic.mime || 'image/jpeg'});
      t.artUrl = URL.createObjectURL(blob);
    } catch(e){ t.artUrl = null; }
    updates.push(t);
  }
  if(!updates.length) return;
  await Promise.all(updates.map(function(t){
    try { return dbPut(t); } catch(e){ return Promise.resolve(); }
  }));
  updates.forEach(patchArtworkInDOM);
  if(curId){
    var cur = trackById(curId);
    if(cur && _albumKey(cur) === key) updatePlayerUI(cur);
  }
}

// Patch artwork into already-rendered rows without a full re-render.
// Handles both flat rows (data-id) and group headers (data-grp).
function patchArtworkInDOM(rec){
  if(!rec || !rec.artUrl) return;
  // Flat track rows
  var row = $('list').querySelector('[data-id="'+rec.id+'"]');
  if(row){
    var ico = row.querySelector('.ico');
    if(ico){
      ico.style.backgroundImage = 'url('+rec.artUrl+')';
      ico.innerHTML = '';
    }
  }
  // Group headers in album/artist view — find any header whose first covered
  // track is this record, or update if header currently has no art.
  var key = view==='albums' ? 'album' : 'artist';
  var groupName = rec[key];
  if(groupName){
    var hdr = $('list').querySelector('.grp-hdr[data-grp="'+groupName.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"]');
    if(hdr){
      var grpArt = hdr.querySelector('.grp-art');
      if(grpArt && !grpArt.style.backgroundImage){
        grpArt.style.backgroundImage = 'url('+rec.artUrl+')';
        grpArt.innerHTML = '';
      }
    }
  }
}

function queueArtwork(rec){
  if(!rec || rec.artUrl) return;
  var hasArtist = rec.artist && rec.artist !== 'Unknown artist';
  var hasAlbum  = rec.album  && rec.album  !== 'Unknown album';
  if(!hasArtist && !hasAlbum) return;

  // Fast path — sibling already has cover for this album. No network.
  var key = _albumKey(rec);
  if(key){
    if(_albumArtMisses[key]) return; // negative cache hit
    var sibling = _findSiblingWithArt(key, rec.id);
    if(sibling){ _applyPicToTrack(rec, sibling.pic); return; }
  }

  _artQueue.push(rec);
  if(!_artFetching) _drainArtQueue();
}

async function _drainArtQueue(){
  _artFetching = true;
  while(_artQueue.length){
    var rec = _artQueue.shift();
    var cur = trackById(rec.id);
    if(!cur || cur.artUrl) continue;

    var key = _albumKey(rec);

    // Re-check caches: state may have changed while this rec waited in the queue.
    if(key){
      if(_albumArtMisses[key]) continue;
      var sibling = _findSiblingWithArt(key, rec.id);
      if(sibling){ await _applyPicToTrack(rec, sibling.pic); continue; }
    }

    try { await _fetchAlbumArt(rec, key); } catch(e){}

    // Throttle: 600ms between distinct ALBUM fetches now, not per-track.
    await new Promise(function(r){ setTimeout(r, 600); });
  }
  _artFetching = false;
}

// One network round-trip per album, deduped via _albumArtPromises.
async function _fetchAlbumArt(rec, key){
  // Without a stable key we can't share — fall back to per-track behaviour.
  if(!key){
    var pic = await _doFetchArt(rec);
    if(pic) await _applyPicToTrack(rec, pic);
    return;
  }
  if(!_albumArtPromises[key]){
    _albumArtPromises[key] = _doFetchArt(rec);
  }
  try {
    var pic2 = await _albumArtPromises[key];
    if(!pic2){
      _albumArtMisses[key] = true;
      return;
    }
    await _applyPicToAlbum(key, pic2);
  } finally {
    // Drop the promise once it's resolved — pic bytes now live in lib + IDB.
    delete _albumArtPromises[key];
  }
}

// Raw fetch: iTunes Search → cover URL → image bytes. Returns {data, mime} or null.
async function _doFetchArt(rec){
  try {
    var terms = [];
    if(rec.artist && rec.artist !== 'Unknown artist') terms.push(rec.artist);
    if(rec.album  && rec.album  !== 'Unknown album')  terms.push(rec.album);
    var term = encodeURIComponent(terms.join(' '));

    var apiResp = await fetch('https://itunes.apple.com/search?term='+term+'&entity=album&limit=3&media=music');
    if(!apiResp.ok) return null;
    var data = await apiResp.json();
    if(!data.results || !data.results.length) return null;

    // 600px is ample for a 260px-max display at ~319ppi; 1000px wasted
    // both IndexedDB storage and resident RAM (bytes are held in lib[].pic).
    var artUrl = (data.results[0].artworkUrl100 || '').replace('100x100bb','600x600bb');
    if(!artUrl) return null;

    var imgResp = await fetch(artUrl);
    if(!imgResp.ok) return null;
    var blob = await imgResp.blob();
    var arrBuf = await blob.arrayBuffer();
    return { data: new Uint8Array(arrBuf), mime: blob.type || 'image/jpeg' };
  } catch(e){
    return null;
  }
}

function rowHTML(t){
  var playing=t.id===curId;
  var icoSty=t.artUrl?' style="background-image:url('+t.artUrl+')"':'';
  var icoIn=t.artUrl?'':'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
  return '<div class="row'+(playing?' play':'')+'" data-id="'+t.id+'">'
    +'<div class="ico"'+icoSty+'>'+icoIn+'</div>'
    +'<div class="meta"><div class="t">'+esc(t.name)+'</div>'
    +'<div class="s">'+esc(t.artist)+(t.dur?' \u00b7 '+fmt(t.dur):'')+'</div></div>'
    +'<button class="fav'+(t.fav?' on':'')+'" data-fav="'+t.id+'">'+svgHeart(t.fav)+'</button>'
    +'</div>';
}

function render(){
  var list=$('list');
  var vis=getVisible();
  if(!lib.length){
    list.innerHTML='<div class="state"><div class="big">\uD83C\uDFB5</div>'
      +'<div>Press the <b>...</b> to add music<br>'
      +'You can add a folder or induvidual files.<br><br>'
      +'<span style="font-size:12px;opacity:.7">Add Music can be used multiple times<br>to add more folders or files</span></div></div>';
    return;
  }
  if(!vis.length){
    var msg=view==='fav'?'No favorites.<br>Tap the heart icon on a track.':'No tracks match your search.';
    list.innerHTML='<div class="state"><div class="big">\uD83D\uDD0D</div><div>'+msg+'</div></div>';
    return;
  }
  var html='';
  if(view==='albums'||view==='artists'){
    var key=view==='albums'?'album':'artist';
    var groups={};
    vis.forEach(function(t){ (groups[t[key]]=groups[t[key]]||[]).push(t); });

    // NOTE: openGroups is the single source of truth — never forced open here.
    // Groups are opened either by user tap, or by playFromGroup() when playback starts.

    Object.keys(groups).sort(function(a,b){
      if(sort==='recent'){
        // Preserve insertion order: compare the id of the first track in each group
        return groups[a][0].id - groups[b][0].id;
      }
      // Albums view + sort by Artist: two-level sort — artist first, then album (ignoring leading "The ")
      if(view==='albums' && sort==='artist'){
        var artA=groups[a][0].artist, artB=groups[b][0].artist;
        var c=artA.localeCompare(artB,'da',{sensitivity:'base'});
        if(c!==0) return c;
        return _stripThe(a).localeCompare(_stripThe(b),'da',{sensitivity:'base'});
      }

      if(view==='albums'){

    }).forEach(function(g){

      var coverTrack=groups[g].find(function(t){return !!t.artUrl;})||null;
      var artSty=coverTrack?' style="background-image:url('+coverTrack.artUrl+')"':'';
      var artIn=coverTrack?'':'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';

var artistLabel = view==='albums' ? '<span class="grp-artist">'+esc(getDisplayArtist(groups[g]))+'</span>' : '';
      html+='<div class="grp-hdr'+(isOpen?' open':'')+(hasCur?' active':'')+'" data-grp="'+esc(g)+'">'
        +'<div class="grp-art"'+artSty+'>'+artIn+'</div>'
        +'<div class="grp-meta">'
        +artistLabel
        +'<span class="grp-name">'+esc(g)+'</span>'

      if(isOpen){

  } else {

function saveMeta(){
  if(!db) return;
  try {
    dbMeta('curId',curId);
    dbMeta('view',view);
    dbMeta('sort',sort);
    dbMeta('vol',$('vol-slider').value);
    dbMeta('shuffle',shuffle);
    dbMeta('repeat',repeat);
    dbMeta('theme',theme);
  } catch(e){}
}

// Saves the full playback session — called periodically and on page hide/unload.
// Kept separate from saveMeta so we don't hit IndexedDB on every chip/fav toggle.
function savePlaybackState(){
  if(!db) return;
  try {
    dbMeta('curId', curId);
    dbMeta('currentTime', (audio && !isNaN(audio.currentTime)) ? audio.currentTime : 0);
    dbMeta('queue', JSON.stringify(queue));
    dbMeta('qpos', qpos);
    dbMeta('shuffle', shuffle);
    dbMeta('repeat', repeat);
    dbMeta('vol', $('vol-slider').value);
  } catch(e){}
}

// Interval handle — active only while audio is playing
var _saveInterval = null;

function _startSaveInterval(){
  if(_saveInterval) return;
  _saveInterval = setInterval(savePlaybackState, 5000);
}
function _stopSaveInterval(){
  if(_saveInterval){ clearInterval(_saveInterval); _saveInterval=null; }
}

// Guard: true while we are switching tracks. Prevents the pause event that fires
// when audio.src is replaced from writing currentTime=0 over the real saved position.
var _transitioning = false;

async function loadLibrary(){
  try {
    var rows=await dbAll();
    lib=[];
    rows.forEach(function(rec){
      if(rec.blob){
        rec.url=URL.createObjectURL(rec.blob);
        if(rec.pic){
          try{rec.artUrl=URL.createObjectURL(new Blob([rec.pic.data],{type:rec.pic.mime||'image/jpeg'}));}
          catch(e){rec.artUrl=null;}
        } else { rec.artUrl=null; }
      }
      lib.push(rec);
    });
    var sv=await dbMeta('view');       if(sv)    view=sv;
    var so=await dbMeta('sort');       if(so)    sort=so;
    var th=await dbMeta('theme');      applyTheme(th||'orange');
    var vol=await dbMeta('vol');       if(vol)   $('vol-slider').value=vol;
    var sh=await dbMeta('shuffle');    if(sh!=null) shuffle=!!sh;
    var rp=await dbMeta('repeat');     if(rp!=null) repeat=!!rp;
    var ci=await dbMeta('curId');

    $('b-shuf').classList.toggle('on',shuffle);
    $('b-rep').classList.toggle('on',repeat);
    document.querySelectorAll('.chip').forEach(function(c){
      c.classList.toggle('on',c.dataset.v===view);
    });
    document.querySelectorAll('.sort-pill').forEach(function(p){
      p.classList.toggle('on',p.dataset.s===sort);
    });

    if(ci && trackById(ci)){
      curId=ci;
      var t=trackById(curId);
      updatePlayerUI(t);
      audio.src=t.url;
      audio.volume=$('vol-slider').value/100;

      // Restore queue and position within the queue
      var savedQueue=await dbMeta('queue');
      var savedQpos=await dbMeta('qpos');
      if(savedQueue){
        try{
          var parsedQueue=JSON.parse(savedQueue);
          // Validate every id still exists in the library before trusting the queue
          if(Array.isArray(parsedQueue) && parsedQueue.every(function(id){return !!trackById(id);})){
            queue=parsedQueue;
            qpos=(savedQpos!=null && savedQpos>=0 && savedQpos<queue.length) ? savedQpos : queue.indexOf(curId);
          }
        }catch(ex){}
      }
      // Fall back to a minimal queue of just the current track if nothing was saved/valid
      if(!queue.length){ queue=[curId]; qpos=0; }

      // Seek to saved position once the browser has the audio metadata
      var savedTime=await dbMeta('currentTime');
      if(savedTime && savedTime>0){
        var onMeta=function(){
          // Only seek if the position is meaningfully into the track (>2s)
          // and doesn't overshoot the duration
          if(audio.duration && savedTime > 2 && savedTime < audio.duration - 1){
            audio.currentTime=savedTime;
          }
          audio.removeEventListener('loadedmetadata', onMeta);
        };
        audio.addEventListener('loadedmetadata', onMeta);
      }
    }
    render();

    // Background artwork fetch for tracks loaded without embedded covers
    if(navigator.onLine){
      lib.forEach(function(rec){ if(!rec.artUrl) queueArtwork(rec); });
    }
  } catch(e){ render(); }
}

audio.addEventListener('timeupdate',function(){
  if(!audio.duration) return;
  var pct=(audio.currentTime/audio.duration)*100;
  // Update the lock-screen / notification scrubber even when backgrounded.
  if('mediaSession' in navigator){
    try{navigator.mediaSession.setPositionState(
      {duration:audio.duration,playbackRate:1,position:audio.currentTime});}catch(e){}
  }
  // The on-screen progress bars aren't visible while hidden — skip the writes.
  if(document.hidden) return;
  var pf=pct.toFixed(1)+'%';
  $('pl-fill').style.width=pf;
  $('pl-thumb').style.left=pf;
  $('mini-prog').style.width=pf;
  $('pl-cur').textContent=fmt(audio.currentTime);
  $('pl-dur').textContent=fmt(audio.duration);
});
audio.addEventListener('ended',function(){
  _stopSaveInterval();
  if(repeat){ audio.currentTime=0; audio.play(); }
  else nextTrack();
  savePlaybackState();
});
audio.addEventListener('play',function(){
  $('pl-ico').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  $('mini-ico').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  $('pl-art').classList.add('playing');
  if('mediaSession' in navigator) navigator.mediaSession.playbackState='playing';
  _transitioning = false;  // new track is live — saves are safe again
  _startSaveInterval();
});
audio.addEventListener('pause',function(){
  $('pl-ico').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
  $('mini-ico').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
  $('pl-art').classList.remove('playing');
  if('mediaSession' in navigator) navigator.mediaSession.playbackState='paused';
  _stopSaveInterval();
  if(!_transitioning) savePlaybackState();  // skip the src-swap pause, save real pauses only
});
audio.addEventListener('error',function(){
  // Ignore the benign error fired when src is cleared (e.g. on library clear).
  if(!audio.src || !curId) return;
  toast('Couldn\u2019t play this track');
});
  // Lazy duration — fills in the first time a track is actually played,
// instead of probing every track at ingest time.
audio.addEventListener('loadedmetadata',function(){
  if(!curId || !audio.duration || isNaN(audio.duration)) return;
  var t = trackById(curId);
  if(!t || (t.dur && Math.abs(t.dur - audio.duration) < 0.5)) return;
  t.dur = audio.duration;
  try { dbPut(t); } catch(e){}
});

// Save position when the user switches apps, locks screen, or closes the tab
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'hidden') savePlaybackState();
});
window.addEventListener('beforeunload', savePlaybackState);

// ================================================================
// ALBUM ART SWIPE — drag left/right on the art to skip tracks
// ================================================================
(function(){
  var art = $('pl-art');
  var startX=0, startY=0, dx=0, dy=0, active=false;
  var THRESHOLD = 72; // px needed to commit a skip

  art.addEventListener('touchstart', function(e){
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dx = 0; dy = 0; active = true;
    art.style.transition = 'none';
  }, {passive:true});

  art.addEventListener('touchmove', function(e){
    if(!active) return;
    dx = e.touches[0].clientX - startX;
    dy = e.touches[0].clientY - startY;
    if(Math.abs(dy) > Math.abs(dx)) return; // mostly vertical — let it pass through
    art.style.transform = 'translateX('+dx+'px) rotate('+(dx*0.03)+'deg)';
  }, {passive:true});

  function onEnd(){
    if(!active) return;
    active = false;
    if(Math.abs(dx) > THRESHOLD && Math.abs(dx) > Math.abs(dy)){
      var dir = dx > 0 ? 1 : -1; // +1 = swiped right = go prev; -1 = swiped left = go next
      var W   = art.offsetWidth + 60;
      _artSwiping = true;
      // 1. Slide current art out
      art.style.transition = 'transform .18s ease-in, opacity .18s';
      art.style.transform  = 'translateX('+(dir * W)+'px) rotate('+(dir*18)+'deg)';
      art.style.opacity    = '0';
      setTimeout(function(){
        // 2. Change track (updatePlayerUI fires here, sees _artSwiping=true, skips reset)
        if(dir > 0) prevTrack(); else nextTrack();
        // 3. Place new art off-screen on the opposite side
        art.style.transition = 'none';
        art.style.transform  = 'translateX('+(-dir * 60)+'px)';
        art.style.opacity    = '0';
        // 4. Animate in on the next two frames (ensures the browser has painted step 3)
        requestAnimationFrame(function(){
          requestAnimationFrame(function(){
            _artSwiping = false;
            art.style.transition = 'transform .28s cubic-bezier(.2,0,.2,1), opacity .22s';
            art.style.transform  = '';
            art.style.opacity    = '1';
          });
        });
      }, 190);
    } else {
      // Didn't reach threshold — snap back
      art.style.transition = 'transform .28s cubic-bezier(.2,0,.2,1)';
      art.style.transform  = '';
    }
  }

  art.addEventListener('touchend',   onEnd);
  art.addEventListener('touchcancel', onEnd);
})();

// ================================================================
// VERSION CHECK / UPDATE
// ================================================================
var _versionCache = null; // { remote, fetchedAt }
var VERSION_TTL_MS = 10 * 60 * 1000; // 10 min — gentle on GitHub rate limit

function _normVer(v){
  return String(v||'').trim().replace(/^v/i,'');
}
// Returns true if `remote` is strictly newer than `local` using dotted-number compare.
function _isNewerVersion(remote, local){
  if(!remote || !local) return false;
  var r = _normVer(remote).split(/[.\-+]/).map(function(n){return parseInt(n,10);});
  var l = _normVer(local).split(/[.\-+]/).map(function(n){return parseInt(n,10);});
  var len = Math.max(r.length, l.length);
  for(var i=0;i<len;i++){
    var rv = isNaN(r[i]) ? 0 : r[i];
    var lv = isNaN(l[i]) ? 0 : l[i];
    if(rv > lv) return true;
    if(rv < lv) return false;
  }
  return false;
}

async function fetchLatestVersion(force){
  // Skip the network entirely if repo placeholder hasn't been set
  if(!GITHUB_REPO || GITHUB_REPO.indexOf('YOUR_') === 0) return null;
  if(!navigator.onLine) return null;

  var now = Date.now();
  if(!force && _versionCache && (now - _versionCache.fetchedAt) < VERSION_TTL_MS){
    return _versionCache.remote;
  }
  try {
    var resp = await fetch('https://api.github.com/repos/'+GITHUB_REPO+'/releases/latest', {
      headers:{ 'Accept':'application/vnd.github+json' },
      cache:'no-store'
    });
    if(!resp.ok) return null;
    var data = await resp.json();
    var tag = data && data.tag_name ? String(data.tag_name) : null;
    _versionCache = { remote:tag, fetchedAt:now };
    return tag;
  } catch(e){
    return null;
  }
}

async function refreshVersionUI(){
  var sub = $('mi-version-sub');
  var btn = $('mi-update-btn');
  if(!sub || !btn) return;

  // Always reset button first
  btn.classList.remove('vis');
  btn.disabled = false;
  btn.classList.remove('spin');
  $('mi-update-lbl').textContent = 'Update';

  // Initial state: show local version + checking
  sub.textContent = APP_VERSION + ' \u00b7 checking\u2026';

  // Bad/placeholder repo — show version only
  if(!GITHUB_REPO || GITHUB_REPO.indexOf('YOUR_') === 0 || GITHUB_REPO.indexOf('github.com') !== -1){
    sub.textContent = APP_VERSION + ' \u00b7 set GITHUB_REPO to owner/repo';
    return;
  }

  var remote = await fetchLatestVersion(true); // force fresh check on menu open
  if(remote === null){
    sub.textContent = APP_VERSION + ' \u00b7 ' + (navigator.onLine ? 'check failed' : 'offline');
    return;
  }
  if(_isNewerVersion(remote, APP_VERSION)){
    sub.textContent = APP_VERSION + ' \u2192 ' + remote + ' available';
    btn.classList.add('vis');
  } else {
    sub.textContent = APP_VERSION + ' \u00b7 up to date \u2713';
  }
}

async function performUpdate(){
  var btn = $('mi-update-btn');
  var lbl = $('mi-update-lbl');
  if(btn){
    btn.disabled = true;
    btn.classList.add('spin');
    if(lbl) lbl.textContent = 'Updating';
  }
  try {
    // Save state so playback resumes after the hard reload
    try { savePlaybackState(); } catch(e){}

    // 1) Unregister all service workers so the next navigation hits the network
    if('serviceWorker' in navigator){
      var regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function(r){ return r.unregister(); }));
    }
    // 2) Wipe every Cache API entry (SW shell + anything else)
    if('caches' in window){
      var keys = await caches.keys();
      await Promise.all(keys.map(function(k){ return caches.delete(k); }));
    }
    // 3) Hard reload — short delay to let IndexedDB writes flush
    setTimeout(function(){ location.reload(); }, 250);
  } catch(e){
    if(btn){
      btn.disabled = false;
      btn.classList.remove('spin');
      if(lbl) lbl.textContent = 'Update';
    }
    toast('Update failed');
  }
}

$('mi-update-btn').addEventListener('click', performUpdate);

// ================================================================
// PWA SETUP — manifest + icon generated at runtime, SW registered
// ================================================================

function makeIcon(size){
  var c=document.createElement('canvas');
  c.width=size; c.height=size;
  var ctx=c.getContext('2d');
  var r=size*.18;
  // Rounded orange background
  ctx.fillStyle='#F97316';
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.arcTo(size,0,size,r,r); ctx.lineTo(size,size-r);
  ctx.arcTo(size,size,size-r,size,r); ctx.lineTo(r,size);
  ctx.arcTo(0,size,0,size-r,r); ctx.lineTo(0,r);
  ctx.arcTo(0,0,r,0,r); ctx.closePath(); ctx.fill();
  // Vinyl body
  ctx.fillStyle='#1e0a00';
  ctx.beginPath();
  ctx.arc(size/2,size/2,size*.33,0,Math.PI*2); ctx.fill();
  // Groove rings
  ctx.strokeStyle='rgba(255,255,255,.13)';
  ctx.lineWidth=size*.028;
  [.14,.20,.26].forEach(function(rv){
    ctx.beginPath();
    ctx.arc(size/2,size/2,size*rv,0,Math.PI*2); ctx.stroke();
  });
  // Label
  ctx.fillStyle='#F97316';
  ctx.beginPath();
  ctx.arc(size/2,size/2,size*.115,0,Math.PI*2); ctx.fill();
  // Center hole
  ctx.fillStyle='#1e0a00';
  ctx.beginPath();
  ctx.arc(size/2,size/2,size*.034,0,Math.PI*2); ctx.fill();
  return c.toDataURL('image/png');
}

function installPWA(){
  // Generate icons
  var ic192=makeIcon(192);
  var ic512=makeIcon(512);

  // Inject apple-touch-icon into head
  var touchIcon=document.createElement('link');
  touchIcon.rel='apple-touch-icon';
  touchIcon.href=ic192;
  document.head.appendChild(touchIcon);

  // Build manifest blob
  var manifest={
    name:'HarbuPlayer',
    short_name:'Harbu',
    description:'Your personal music player',
    start_url:location.pathname,
    scope:location.pathname.replace(/[^/]*$/,''),
    display:'standalone',
    orientation:'portrait',
    background_color:'#FFF7ED',
    theme_color:'#F97316',
    icons:[
      {src:ic192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:ic512,sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  var blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);

  // Service worker — only works on HTTPS (required by browsers)
  if('serviceWorker' in navigator && location.protocol==='https:'){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      console.log('SW registered, scope:', reg.scope);
    }).catch(function(e){
      console.log('SW registration skipped:', e.message);
    });
  }
}

installPWA();

// ================================================================
// BOOT 
// ================================================================
openDB().then(loadLibrary).catch(function(e){
  console.warn('IndexedDB fejl:', e);
  render();
});

})();
